version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data      # persist SQLite + seed JSON
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/gu_board_review.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - PROFESSOR_USERNAME=${PROFESSOR_USERNAME:-admin}
      - PROFESSOR_PASSWORD=${PROFESSOR_PASSWORD:-changeme}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
